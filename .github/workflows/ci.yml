name: Application 0 CI

on:
  push:
  pull_request:

jobs:
  app-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r salon_missed_call_assistant/requirements.txt

      - name: Compile Streamlit app
        run: |
          python -m py_compile app.py
          python -m py_compile salon_missed_call_assistant/app.py salon_missed_call_assistant/webhook_receiver.py salon_missed_call_assistant/preflight.py

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Salon preflight
        run: python salon_missed_call_assistant/preflight.py
